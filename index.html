<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>道德经详解 — 老子全文逐章解读</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.18.3/dist/index.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d0d1a;--card:#14142a;--card2:#1a1a35;--accent:#b8860b;--accent2:#daa520;--text:#d4d4e8;--text2:#8888aa;--border:#2a2a50;--gold:#ffd700;font-size:15px}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif SC','SimSun','STSong','KaiTi',serif;min-height:100vh}
/* header */
.header{position:fixed;top:0;left:0;right:0;z-index:100;background:linear-gradient(135deg,#0d0d1a 0%,#1a1a35 100%);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px;backdrop-filter:blur(12px)}
.header h1{font-size:1.3rem;color:var(--gold);font-weight:700;letter-spacing:2px}
.header h1 span{color:var(--text2);font-weight:400;font-size:.85rem;letter-spacing:0}
.header .sub{color:var(--text2);font-size:.8rem;margin-left:auto}
/* sidebar toggle */
#menuBtn{background:none;border:1px solid var(--border);color:var(--gold);font-size:1.2rem;padding:6px 12px;border-radius:6px;cursor:pointer;transition:.2s}
#menuBtn:hover{background:var(--card2)}
/* sidebar */
.sidebar{position:fixed;top:60px;left:0;bottom:0;width:200px;background:var(--card);border-right:1px solid var(--border);overflow-y:auto;z-index:90;transition:transform .3s;padding:12px 0}
.sidebar.hidden{transform:translateX(-210px)}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sidebar .search{padding:0 12px 10px;position:sticky;top:0;background:var(--card);z-index:2}
.sidebar .search input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:.8rem;outline:none;font-family:inherit}
.sidebar .search input:focus{border-color:var(--accent)}
.sidebar .ch-link{display:block;padding:8px 14px;color:var(--text2);text-decoration:none;font-size:.92rem;border-left:3px solid transparent;transition:.2s;cursor:pointer}
.sidebar .ch-link:hover{color:var(--text);background:var(--card2);border-left-color:var(--accent)}
.sidebar .ch-link.active{color:var(--gold);border-left-color:var(--gold);background:rgba(184,134,11,.1)}
.sidebar .ch-link .num{color:var(--accent2);font-weight:700;margin-right:6px}
.sidebar .ch-link.hidden{display:none}
/* main */
.main{margin-left:200px;padding:80px 24px 60px;transition:margin-left .3s}
.main.expanded{margin-left:0}
/* chapter card */
.chapter{width:100%;max-width:900px;margin:0 0 36px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px 32px;scroll-margin-top:80px;transition:.3s}
.chapter:hover{border-color:var(--accent);box-shadow:0 0 30px rgba(184,134,11,.08)}
.chapter .ch-title{font-size:1.15rem;color:var(--gold);font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.chapter .ch-title .ch-num{background:var(--accent);color:#fff;font-size:.7rem;padding:2px 10px;border-radius:20px;font-weight:700}
.chapter .ch-title .ch-name{font-size:.85rem;color:var(--accent2)}
.chapter .ch-original{margin:16px 0;padding:16px 20px;background:var(--card2);border-radius:8px;border-left:4px solid var(--accent)}
.chapter .ch-original p{margin-bottom:4px}
.chapter .ch-original p:last-child{margin-bottom:0}
.chapter .ch-explanation{margin-top:14px;line-height:1.9;font-size:.92rem;color:var(--text)}
.chapter .ch-explanation .label{display:inline-block;color:var(--accent2);font-weight:700;font-size:.8rem;margin-bottom:6px;letter-spacing:1px}
.chapter .ch-explanation .label::before{content:'▸ '}
.chapter .ch-explanation p{margin-bottom:8px;text-indent:2em}
.chapter .ch-explanation .word-break{background:var(--card2);border-radius:6px;padding:12px 16px;margin:10px 0;border:1px dashed var(--border)}
.chapter .ch-explanation .word-break .wb-item{display:flex;gap:8px;margin-bottom:6px;font-size:.88rem}
.chapter .ch-explanation .word-break .wb-item:last-child{margin-bottom:0}
.chapter .ch-explanation .word-break .wb-word{color:var(--gold);font-weight:700;min-width:60px}
.chapter .ch-explanation .word-break .wb-meaning{color:var(--text)}
/* progress */
.progress{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--card);border-top:1px solid var(--border);padding:8px 24px;display:flex;align-items:center;gap:12px;font-size:.75rem;color:var(--text2)}
.progress .bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress .bar .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:2px;transition:width .3s;width:0%}
/* scroll to top */
#topBtn{position:fixed;bottom:50px;right:24px;width:40px;height:40px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--gold);font-size:1.2rem;cursor:pointer;z-index:99;display:none;transition:.3s;align-items:center;justify-content:center}
#topBtn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
#topBtn.show{display:flex}
/* responsive */
@media(max-width:768px){.sidebar{width:180px}.sidebar.hidden{transform:translateX(-190px)}.main{margin-left:0}.main.expanded{margin-left:0}.chapter{padding:20px 16px}.header h1{font-size:1rem}.header .sub{display:none}}
@media(min-width:769px){.sidebar{transform:translateX(0)}}
/* loading / empty state for search */
.no-match{text-align:center;padding:60px 20px;color:var(--text2);font-size:.95rem}
/* calligraphy font for original text */
.ch-original p{font-family:'Ma Shan Zheng','KaiTi','STKaiti',serif;font-size:2.3rem;line-height:2.8;letter-spacing:6px;text-indent:1.8em}
.ch-original ruby{display:inline-flex;flex-direction:column;align-items:center;justify-content:flex-start;vertical-align:top;line-height:1;margin:0;padding:0;width:auto}
.ch-original ruby rt{font-family:Arial,'Noto Serif SC',sans-serif;font-size:.85rem;color:#daa520;letter-spacing:0;line-height:1.15;font-weight:400;user-select:none;margin-bottom:1px}
.ch-original .pinyin-hidden ruby rt{display:none}
/* pinyin toggle btn */
#pinyinBtn{background:none;border:1px solid var(--border);color:var(--text2);font-size:.7rem;padding:4px 10px;border-radius:6px;cursor:pointer;transition:.2s;font-family:inherit;white-space:nowrap}
#pinyinBtn:hover{background:var(--card2);color:var(--gold);border-color:var(--accent)}
#pinyinBtn.on{color:var(--gold);border-color:var(--accent)}
/* music btn */
#musicBtn{background:none;border:1px solid var(--border);color:var(--text2);font-size:.9rem;padding:4px 10px;border-radius:6px;cursor:pointer;transition:.2s;font-family:inherit;line-height:1}
#musicBtn:hover{background:var(--card2);color:var(--gold);border-color:var(--accent)}
#musicBtn.on{color:var(--gold);border-color:var(--accent)}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <button id="menuBtn" onclick="toggleSidebar()">☰</button>
  <h1>道德经详解 <span>· 老子</span></h1>
  <button id="pinyinBtn" onclick="togglePinyin()">拼音</button>
  <button id="musicBtn" onclick="toggleMusic()">🔊</button>
  <span class="sub">全文 81 章 · 逐章解读</span>
</header>

<!-- Sidebar -->
<nav class="sidebar" id="sidebar">
  <div class="search"><input type="text" id="searchInput" placeholder="搜索章节…" oninput="filterChapters()"></div>
  <div id="sidebarLinks"></div>
</nav>

<!-- Main -->
<main class="main" id="main">
  <div id="chaptersContainer"></div>
</main>

<!-- Progress -->
<div class="progress">
  <span id="progressLabel">0 / 81</span>
  <div class="bar"><div class="fill" id="progressFill"></div></div>
</div>

<button id="topBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
// ====== 道德经 81 章全文数据 ======
const DAODEJING = [
  {
    n:1, title:'体道第一',
    text:['道可道，非常道；名可名，非常名。无名，天地之始；有名，万物之母。故常无欲，以观其妙；常有欲，以观其徼。此两者同出而异名，同谓之玄。玄之又玄，众妙之门。'],
    explain:'<p>本章是《道德经》的总纲，老子开篇即点明「道」不可言说、不可定义的超越性。</p>',
    words:[
      ['道可道','第一个「道」指宇宙本源/终极真理，第二个「道」是言说。可言说的道不是恒常的道'],
      ['名可名','第一个「名」指概念/名称，第二个「名」是命名。可命名的名不是恒常的名'],
      ['无名，天地之始','无（无名）是天地的原初状态，超越一切概念的混沌'],
      ['有名，万物之母','有（有名）是万物生成的根源，概念与形名的出现使万物得以被认识'],
      ['常无欲，以观其妙','以无欲之心体悟道的精微奥妙'],
      ['常有欲，以观其徼','以有欲之心观察道的边界与运行轨迹'],
      ['同出而异名','「无」与「有」同出于道，只是名称不同'],
      ['玄之又玄，众妙之门','玄深而又玄深，是一切奥妙的门户']
    ],
    note:'老子用「道可道，非常道」六字划定了语言的边界——终极真理无法被言说所穷尽，唯有放下概念执著，才能契入道的境界。'
  },
  {
    n:2, title:'养身第二',
    text:['天下皆知美之为美，斯恶已；皆知善之为善，斯不善已。故有无相生，难易相成，长短相形，高下相倾，音声相和，前后相随。是以圣人处无为之事，行不言之教；万物作焉而不辞，生而不有，为而不恃，功成而弗居。夫唯弗居，是以不去。'],
    explain:'<p>本章讲对立统一的辩证法，强调圣人不执着于分别、不居功自傲的处世之道。</p>',
    words:[
      ['美/恶、善/不善','当人们规定什么是「美」，也就同时产生了「丑」；规定「善」，也就产生了「不善」——价值判断是相对的'],
      ['有无相生…前后相随','六对矛盾范畴：有与无互相生成、难与易互相成就、长与短互相显现、高与下互相依靠、音与声互相和谐、前与后互相跟随。一切对立面相互依存'],
      ['圣人处无为之事','圣人以「无为」的态度处事——不妄为、不强为，顺应自然'],
      ['行不言之教','用行动而非言辞来教化——以身作则'],
      ['生而不有，为而不恃，功成而弗居','生成万物而不占有，有所作为而不自恃，功业成就而不居功——这正是「道」的品格'],
      ['夫唯弗居，是以不去','正因为不居功，所以功业不会离去']
    ],
    note:'老子的辩证法不是诡辩，而是对世界本质的深刻洞见。认识到对立面的统一性，才能超越二元对立，达到「无为而无不为」的境界。'
  },
  {
    n:3, title:'安民第三',
    text:['不尚贤，使民不争；不贵难得之货，使民不为盗；不见可欲，使民心不乱。是以圣人之治，虚其心，实其腹，弱其志，强其骨。常使民无知无欲，使夫智者不敢为也。为无为，则无不治。'],
    words:[
      ['不尚贤','不推崇标榜贤能——不制造"贤"与"不肖"的对立，百姓就不会去争名'],
      ['不贵难得之货','不珍视稀有之物——不刺激贪欲，百姓就不会偷盗'],
      ['不见可欲','不展现引起欲望的事物——民心就不会混乱'],
      ['虚其心，实其腹','使心灵清虚（减少杂念），使肚腹充实（满足基本需求）'],
      ['弱其志，强其骨','弱化争强的意志，强健体魄筋骨'],
      ['为无为，则无不治','以「无为」的方式治理，就没有治理不好的']
    ],
    explain:'<p>本章讲治国安民之道：减少人为的价值标榜和欲望刺激，让百姓回归淳朴自然的生活状态。老子并非反对文明，而是反对文明带来的异化——名利的追逐使人失去本真。</p>',
    note:'老子「虚其心实其腹」常被误解为愚民政策。实际上，这是主张满足基本生存需求的同时减少精神污染——和现代社会推崇的「断舍离」「极简主义」有相通之处。'
  },
  {
    n:4, title:'无源第四',
    text:['道冲而用之或不盈，渊兮似万物之宗。挫其锐，解其纷，和其光，同其尘。湛兮似或存。吾不知谁之子，象帝之先。'],
    words:[
      ['道冲而用之或不盈','道是虚空的，但用起来却不穷尽——越用越有，永不枯竭'],
      ['渊兮似万物之宗','深远啊，好像是万物的宗主'],
      ['挫其锐','挫去锋芒——道的品格是内敛而非张扬'],
      ['解其纷','解开纷扰——道使复杂归于简单'],
      ['和其光','调和光芒——不刺眼，不炫目'],
      ['同其尘','混同于尘世——道不离日常，在灰尘中显现'],
      ['象帝之先','在上帝/天帝之前就已存在——道先于一切神灵']
    ],
    explain:'<p>本章描述「道」的虚灵不竭、包容万物的特性。道如同深不见底的源泉，永远流淌却永不干涸。「挫锐解纷、和光同尘」八个字是道家处世哲学的精髓——收敛锋芒、化解纠结、融入世俗。</p>'
  },
  {
    n:5, title:'虚用第五',
    text:['天地不仁，以万物为刍狗；圣人不仁，以百姓为刍狗。天地之间，其犹橐籥乎？虚而不屈，动而愈出。多言数穷，不如守中。'],
    words:[
      ['刍狗','用草扎成的祭祀用狗，祭前珍贵，祭后弃之——比喻没有偏私，顺其自然'],
      ['天地不仁','天地没有偏爱——不是残忍，而是大公无私，一视同仁'],
      ['圣人不仁','圣人效法天地，不偏私、不干预'],
      ['橐籥（tuó yuè）','风箱——中间虚空，越拉动风量越大'],
      ['虚而不屈','空虚却不会穷竭'],
      ['动而愈出','越运动越产生万物'],
      ['多言数穷','政令繁多反而加速失败'],
      ['不如守中','不如持守虚静中和之道']
    ],
    explain:'<p>本章以天地无偏私为喻，批判当时儒家的「仁」之局限性。老子的「不仁」不是冷漠，而是超越偏私的「大仁」——像天地一样，给万物阳光雨露而不求回报。风箱之喻说明虚空的力量：保持虚静状态，反而能生生不息。</p>'
  },
  {
    n:6, title:'成象第六',
    text:['谷神不死，是谓玄牝。玄牝之门，是谓天地根。绵绵若存，用之不勤。'],
    words:[
      ['谷神','「谷」象征虚空，「神」指微妙不测的变化力量。谷神即虚灵不昧的道'],
      ['不死','永恒存在，不生不灭'],
      ['玄牝（pìn）','「牝」是雌性生殖器官，「玄牝」即深奥的母体——道是宇宙的母亲'],
      ['玄牝之门','母体的产门——喻指道化生天地的出口'],
      ['天地根','天地的根源'],
      ['绵绵若存','连绵不断，若有若无'],
      ['用之不勤','用之不尽，永不疲劳']
    ],
    explain:'<p>本章用女性生殖意象来喻「道」。老子是最早推崇「阴性原则」的哲学家——虚空、柔弱、母性不是匮乏，而是最伟大的创造力。「谷神不死」四个字点出：道像山谷一样虚空，却充满神妙生机，永不消亡。</p>'
  },
  {
    n:7, title:'韬光第七',
    text:['天长地久。天地所以能长且久者，以其不自生，故能长生。是以圣人后其身而身先，外其身而身存。非以其无私邪？故能成其私。'],
    words:[
      ['不自生','不为自己而生存——天地运作不是为了自身利益'],
      ['故能长生','所以能永远存在'],
      ['后其身而身先','把自己放在后面，反而能处在前面（谦让反而领先）'],
      ['外其身而身存','把自身置之度外，反而能保全自己'],
      ['非以其无私邪','不正是因为他无私吗'],
      ['故能成其私','所以能成就他自己的目标']
    ],
    explain:'<p>本章从天地「不自生」的自然规律，推导出「无私成私」的处世智慧。天地不是因为追求长久才长久，而是因为不在乎自身、只顺应规律，反而获得了永恒。圣人效法此道：不争先反而领先，不图存反而存身。这是一种深刻的逆向思维——越是刻意追求，越得不到；越是放下，越能成就。</p>'
  },
  {
    n:8, title:'易性第八',
    text:['上善若水。水善利万物而不争，处众人之所恶，故几于道。居善地，心善渊，与善仁，言善信，政善治，事善能，动善时。夫唯不争，故无尤。'],
    words:[
      ['上善若水','最高的善就像水一样'],
      ['利万物而不争','滋润万物却不与万物争高下'],
      ['处众人之所恶','停留在众人都不喜欢的低洼之处'],
      ['故几于道','所以最接近于道'],
      ['居善地','居处善于选择低下的位置'],
      ['心善渊','心胸善于保持深沉如深渊'],
      ['与善仁','交往善于秉持仁爱'],
      ['言善信','言语善于恪守信用'],
      ['政善治','为政善于治理'],
      ['事善能','处事善于发挥能力'],
      ['动善时','行动善于把握时机'],
      ['夫唯不争，故无尤','正因为不争，所以没有过失']
    ],
    explain:'<p>「上善若水」是《道德经》最著名的比喻之一。老子用水的七种美德（居、心、与、言、政、事、动），从七个维度描摹了理想人格。水的核心品格是「不争」——它永远向低处流、滋养万物、柔软却不可战胜。水看似柔弱，实则「天下莫柔弱于水，而攻坚强者莫之能胜」（第78章）。</p>'
  },
  {
    n:9, title:'运夷第九',
    text:['持而盈之，不如其已；揣而锐之，不可长保。金玉满堂，莫之能守；富贵而骄，自遗其咎。功遂身退，天之道也。'],
    words:[
      ['持而盈之','端着满满的水杯——喻指自满自傲'],
      ['不如其已','不如适可而止'],
      ['揣而锐之','捶打得过于锋利——喻指锋芒毕露'],
      ['不可长保','无法长久保持'],
      ['金玉满堂','满屋的金玉财宝'],
      ['莫之能守','没有人能守得住'],
      ['富贵而骄','富贵了还骄横'],
      ['自遗其咎','自己留下祸患'],
      ['功遂身退，天之道也','功业成就后急流勇退，这才是天道']
    ],
    explain:'<p>本章讲「盈满之患」——任何事情到了极端就会转向反面。老子用四个比喻警告世人：不要自满、不要锋芒太露、不要贪恋财富、不要骄横跋扈。「功遂身退」不是消极逃避，而是「知止」的大智慧——在最辉煌的时候选择退隐，保存自己，顺应天道循环的节奏。历史上的张良、范蠡都深谙此道。</p>'

const sidebar = document.getElementById('sidebarLinks');

      wb.appendChild(item);
    });

  if (ch.explain) {
    exp.innerHTML += ch.explain;
  }

  if (ch.note) {
    const p = document.createElement('p');
    p.style.color = '#aaaacc';
    p.style.fontStyle = 'italic';
    p.style.marginTop = '8px';

// ====== Sidebar highlight on scroll ======
const chLinks = document.querySelectorAll('.ch-link');
const chapters = document.querySelectorAll('.chapter');
const progressFill = document.getElementById('progressFill');
const progressLabel = document.getElementById('progressLabel');

function onScroll() {
  const scrollY = window.scrollY + 100;
  let active = 1;
  chapters.forEach((ch, i) => {
    if (ch.offsetTop <= scrollY) active = i + 1;
  });
  chLinks.forEach(a => a.classList.toggle('active', parseInt(a.dataset.num) === active));

  // Progress
  const total = document.body.scrollHeight - window.innerHeight;
  const pct = Math.min(100, Math.round((window.scrollY / total) * 100));
  progressFill.style.width = pct + '%';
  progressLabel.textContent = `${active} / ${chapters.length}`;

  // Top button
  document.getElementById('topBtn').classList.toggle('show', window.scrollY > 400);

  // Chapter card animation
  chapters.forEach(ch => {
    const rect = ch.getBoundingClientRect();
    if (rect.top < window.innerHeight - 100 && rect.bottom > 0) {
      ch.style.borderColor = 'var(--accent)';
    } else {
      ch.style.borderColor = 'var(--border)';
    }
  });
}

window.addEventListener('scroll', onScroll);
window.addEventListener('load', onScroll);

// ====== Sidebar toggle ======
function toggleSidebar() {

}

// ====== Search ======
function filterChapters() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const noMatch = document.getElementById('noMatch');
  let visible = 0;
  DAODEJING.forEach((ch, i) => {
    const card = chapters[i];
    const link = chLinks[i];
    const match = !q ||
      ch.title.includes(q) ||
      ch.text.some(t => t.includes(q)) ||
      (ch.explain && ch.explain.toLowerCase().includes(q)) ||
      ch.n.toString() === q ||
      (ch.words && ch.words.some(w => w[0].includes(q) || w[1].includes(q)));
    card.style.display = match ? '' : 'none';
    link.classList.toggle('hidden', !match);
    if (match) visible++;
  });
  // Clean up old noMatch
  const old = document.getElementById('noMatch');
  if (old) old.remove();
  if (visible === 0 && q) {
    const div = document.createElement('div');
    div.id = 'noMatch';
    div.className = 'no-match';
    div.textContent = `未找到包含「${q}」的章节`;
    container.appendChild(div);
  }
}

function addRubyToText(p) {
  const text = p.textContent;
  if (typeof pinyinPro === 'undefined') { p.textContent = text; return; }
  const chars = text.split('');
  let pyArr;
  try { pyArr = pinyinPro.pinyin(text, { type: 'array', toneType: 'symbol', nonZh: 'consecutive' }); }
  catch(e) { pyArr = chars.map(() => ''); }
  let html = '';
  let buf = '';
  for (let i = 0; i < chars.length; i++) {
    const ch = chars[i];
    const py = pyArr[i] || '';
    if (/^[\u4e00-\u9fff]$/.test(ch)) {
      // Chinese char: flush buffer, emit ruby
      if (buf) { html += buf; buf = ''; }
      html += py && py !== ch ? `<ruby>${ch}<rt>${py}</rt></ruby>` : ch;
    } else {
      buf += ch;
    }
  }
  if (buf) html += buf;
  p.innerHTML = html;
}

// ====== BACKGROUND MUSIC (from sudoku-game) ======
const MusicEngine = {
  ctx: null, gain: null, playing: false, nodes: [],
  init(){
    try{
      this.ctx = new (window.AudioContext||window.webkitAudioContext)();
      this.gain = this.ctx.createGain();
      this.gain.gain.value = 0.12;
      this.gain.connect(this.ctx.destination);
    }catch(e){return false}
    return true;
  },
  playNote(freq, startTime, duration, gainVal){
    if(!this.ctx)return;
    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    g.gain.setValueAtTime(gainVal*0.3, startTime);
    g.gain.exponentialRampToValueAtTime(0.001, startTime+duration);
    osc.connect(g);
    g.connect(this.gain);
    osc.start(startTime);
    osc.stop(startTime+duration);
    this.nodes.push(osc);
  },
  // Pentatonic ambient chord progression
  start(){
    if(!this.ctx)return;
    if(this.playing)return;
    this.playing = true;
    const now = this.ctx.currentTime;
    const pentatonic = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25];
    const chords = [
      [261.63, 329.63, 392.00],
      [293.66, 392.00, 440.00],
      [220.00, 261.63, 329.63],
      [261.63, 329.63, 440.00],
    ];
    const beat = 2.5;
    const totalDuration = chords.length * beat * 2 + 4;
    for(let round=0; round<3; round++){
      chords.forEach((chord, ci)=>{
        const t = now + (round*chords.length + ci)*beat;
        chord.forEach((freq, fi)=>{
          this.playNote(freq, t + fi*0.3, beat*1.6, 0.7);
        });
      });
    }
    const melody = [523.25, 440.00, 587.33, 659.25, 523.25, 587.33, 440.00, 392.00];
    melody.forEach((freq, i)=>{
      this.playNote(freq, now + i*beat*0.75, beat*0.7, 0.35);
    });
    this._timer = setTimeout(()=>{
      if(this.playing) this.start();
    }, (totalDuration-1)*1000);
  },
  stop(){
    this.playing = false;
    if(this._timer) clearTimeout(this._timer);
    this.nodes.forEach(n=>{try{n.stop()}catch(e){}});
    this.nodes = [];
  },
  toggle(){
    if(this.playing){this.stop(); return false}
    if(!this.ctx)this.init();
    if(this.ctx && this.ctx.state==='suspended') this.ctx.resume();
    this.start();
    return true;
  }
};

let musicOn = false;
function toggleMusic(){
  musicOn = MusicEngine.toggle();
  document.getElementById('musicBtn').textContent = musicOn ? '🔊' : '🔇';
  document.getElementById('musicBtn').classList.toggle('on', musicOn);
}

// Auto-start background music (aggressive retry)
function _startMusic(){
  if(MusicEngine.playing) return;
  MusicEngine.init();
  if(MusicEngine.ctx){
    MusicEngine.ctx.resume().then(()=>{
      if(!MusicEngine.playing){
        MusicEngine.start();
        musicOn = true;
        document.getElementById('musicBtn').textContent = '🔊';
        document.getElementById('musicBtn').classList.add('on');
      }
    }).catch(()=>{});
  }
}
// Try immediately, then retry
_startMusic();
let _retryCount = 0;
let _retryTimer = setInterval(()=>{
  _retryCount++;
  _startMusic();
  if(MusicEngine.playing || _retryCount > 15) clearInterval(_retryTimer);
}, 300);
// Click-to-resume fallback
document.addEventListener('click', function _resume(){
  if(MusicEngine.ctx && MusicEngine.ctx.state==='suspended'){
    MusicEngine.ctx.resume().then(()=>{ if(!MusicEngine.playing) MusicEngine.start(); });
  }
}, {once:true, passive:true});
